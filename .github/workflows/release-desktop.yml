# Build Tauri desktop app for Windows, macOS (Intel + Apple Silicon), and Linux,
# then create a GitHub Release and upload installers as direct-download assets.
#
# Optional: For signed updater artifacts (createUpdaterArtifacts: true in tauri.conf.json):
#   TAURI_SIGNING_PRIVATE_KEY — full contents of the .key file from `tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — only if the key was generated with a password
# See docs/TAURI_UPDATER_SIGNING.md
#
# Then trigger via "Run workflow" (Actions tab) or push a version tag (e.g. v1.0.1).

name: Release desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Tag $TAG expects version $TAG_VERSION, but src-tauri/tauri.conf.json has version $TAURI_VERSION. Bump version in tauri.conf.json (and package.json) to match the tag, then push the tag."
            exit 1
          fi
          echo "Version match: tag $TAG, tauri.conf.json $TAURI_VERSION"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # Do not set CI=false here: Tauri’s DMG step uses Finder/AppleScript when CI is unset/false,
      # which fails on GitHub-hosted macOS runners. GHA provides CI=true — keep it so bundle_dmg uses the CI-safe path.
      - name: Build Tauri app
        env:
          # Explicit CI-safe DMG path if a tool ever unsets CI (see Tauri bundle_dmg / Finder AppleScript issues on runners).
          TAURI_BUNDLER_DMG_IGNORE_CI: 'false'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- ${{ matrix.args }}

      # Tauri names both mac targets dice.express.app.tar.gz — merged artifacts would overwrite.
      - name: Disambiguate macOS updater bundle names
        if: matrix.platform == 'macos-latest' && matrix.args == '--target aarch64-apple-darwin'
        shell: bash
        run: |
          M=src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          shopt -s nullglob
          for f in "$M"/*.app.tar.gz; do
            [ -f "$f" ] || continue
            sig="${f}.sig"
            new="${f%.app.tar.gz}_aarch64.app.tar.gz"
            mv "$f" "$new"
            [ -f "$sig" ] && mv "$sig" "${new}.sig"
          done

      - name: Disambiguate macOS updater bundle names (Intel)
        if: matrix.platform == 'macos-latest' && matrix.args == '--target x86_64-apple-darwin'
        shell: bash
        run: |
          M=src-tauri/target/x86_64-apple-darwin/release/bundle/macos
          shopt -s nullglob
          for f in "$M"/*.app.tar.gz; do
            [ -f "$f" ] || continue
            sig="${f}.sig"
            new="${f%.app.tar.gz}_x64.app.tar.gz"
            mv "$f" "$new"
            [ -f "$sig" ] && mv "$sig" "${new}.sig"
          done

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig

      - name: Upload macOS artifacts (Apple Silicon)
        if: matrix.platform == 'macos-latest' && matrix.args == '--target aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.sig

      - name: Upload macOS artifacts (Intel)
        if: matrix.platform == 'macos-latest' && matrix.args == '--target x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.sig

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and resolve tag
        id: version
        run: |
          # Single source of truth: Tauri bundle filenames use src-tauri/tauri.conf.json version
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$TAURI_VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$TAURI_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and upload assets
        env:
          # Use default GITHUB_TOKEN (has contents: write from job permissions). No PAT required.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \
            -o -name '*.sig' -o -name '*.tar.gz' \
          \) -exec cp {} release-assets/ \;
          node scripts/generate-updater-latest.mjs release-assets "${{ steps.version.outputs.version }}" "${{ github.repository }}" "${{ steps.version.outputs.tag }}"
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" --repo ${{ github.repository }} 2>/dev/null; then
            gh release upload "$TAG" release-assets/* --repo ${{ github.repository }} --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Desktop app (Tauri). Built for Windows, macOS (Intel + Apple Silicon), and Linux. Download the installer for your platform below. Auto-updater uses **latest.json** (signatures + bundle URLs)." \
              release-assets/* \
              --repo ${{ github.repository }}
          fi
