# Deploy dice.express (GitHub repo) frontend + Pages Functions to Cloudflare Pages (Direct Upload).
# Cloudflare project name: dice-express → https://dice-express.pages.dev
# Requires GitHub secrets: CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN
# Docs: https://developers.cloudflare.com/pages/how-to/use-direct-upload-with-continuous-integration/
#
# Why 504 happens: Cloudflare's API (GET /accounts/.../pages/projects/dice-express) sometimes
# times out from CI. Your project and all env secrets/vars are unchanged; the timeout is on
# Cloudflare's side. We use longer client timeouts + retries to work around it.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment per branch
concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Test, lint, and build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Unit tests (root)
        run: npm test

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend ESLint
        run: cd frontend && npm run lint

      - name: Build frontend
        run: npm run build:frontend

      - name: Install Playwright browser (Chromium)
        run: npx playwright install chromium --with-deps

      - name: End-to-end smoke (Chromium)
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npm run test:e2e

      - name: Upload Pages static output
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    needs: [verify]
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Pages static output
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          path: frontend/dist

      # Wrangler bundles `functions/` against repo-root `node_modules` (viem, Solana, etc.).
      # Without this install, direct upload fails with "Could not resolve" for those packages.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies (Pages Functions)
        run: npm ci

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Give Cloudflare API more time to respond (504 = their gateway timeout; avoid our client timing out first)
          CF_HTTP_TIMEOUT: "300"
          CF_CONNECT_TIMEOUT: "60"
          CF_BULK_TIMEOUT: "600"
        run: |
          for i in 1 2 3 4 5; do
            echo "Deploy attempt $i of 5..."
            npx wrangler@latest pages deploy frontend/dist --project-name=dice-express && exit 0
            echo "Deploy failed (often 504). Waiting 90s before retry..."
            sleep 90
          done
          echo "::error::All 5 deploy attempts failed. Your dice-express project and env vars are unchanged. Try running 'npm run pages:deploy' from your machine (often works when CI times out), or see docs/DEPLOYMENT.md."
          exit 1
