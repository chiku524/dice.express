# Deploy dice.express (GitHub repo) frontend + Pages Functions to Cloudflare Pages (Direct Upload).
# Cloudflare project name: dice-express → https://dice-express.pages.dev
# Requires GitHub secrets: CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN
# Docs: https://developers.cloudflare.com/pages/how-to/use-direct-upload-with-continuous-integration/

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment per branch
concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Cloudflare API often returns 504 on GET /pages/projects; retry with backoff.
          # Alternative: use Git-based deploy (connect repo in dashboard) so Cloudflare builds on push.
          for i in 1 2 3 4 5; do
            echo "Deploy attempt $i of 5..."
            npx wrangler@latest pages deploy frontend/dist --project-name=dice-express && exit 0
            echo "Deploy failed (often 504). Waiting 90s before retry..."
            sleep 90
          done
          echo "::error::All 5 deploy attempts failed (504 is a Cloudflare API timeout). Use Git-based deploy: Workers & Pages → Create project → Connect to Git → pick this repo."
          exit 1
