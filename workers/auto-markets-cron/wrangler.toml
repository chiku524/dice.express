# Cron Worker: seeds automated prediction markets by calling the Pages API.
# Deploy: npx wrangler deploy (from this directory)
# Set secrets: npx wrangler secret put SITE_URL  (or in Dashboard)
# Optional: AUTO_MARKETS_CRON_SECRET, AUTO_MARKETS_SOURCE, AUTO_MARKETS_LIMIT (default 25),
# AUTO_MARKETS_NEWS_LIMIT (default 50, for news / enriched headline sources)

name = "dice-express-auto-markets-cron"
main = "index.js"
compatibility_date = "2025-02-01"

[triggers]
# Run every hour so new events (games, etc.) get markets soon after they appear in the APIs
# Alternative: every 6 hours "0 */6 * * *" or daily "0 8 * * *"
crons = ["0 * * * *"]

# Env vars (non-secret): set in Dashboard or here. SITE_URL can be a secret.
# Leave AUTO_MARKETS_SOURCE unset for seed_all (all lanes in AUTO_MARKET_SOURCES; sports default hours 2,8,14,20 UTC).
# AUTO_MARKETS_SPORTS_HOURS_UTC = "8"   # once-daily sports
# AUTO_MARKETS_SPORTS_EVERY_RUN = "1"   # sports every tick (high Odds API usage)
[vars]
SITE_URL = "https://dice-express.pages.dev"
# AUTO_MARKETS_SOURCE = "sports"
AUTO_MARKETS_LIMIT = "25"
AUTO_MARKETS_NEWS_LIMIT = "50"
