<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f14" />

    <!-- Primary meta (default; PageSEO updates title/description on route change) -->
    <title>Prediction Markets — Trade on Real-World Outcomes | dice.express</title>
    <meta name="description" content="Trade on prediction markets with Pips. Deposit via crypto, trade on sports, markets, weather & more, withdraw earnings. Peer-to-peer. Your choice. Your chance." />
    <meta name="keywords" content="prediction markets, trade outcomes, sports predictions, crypto markets, event trading, Pips, deposit, withdraw, peer-to-peer, dice.express" />
    <meta name="author" content="dice.express" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://dice-express.pages.dev/" />

    <!-- Favicon & app icons (SVG first so tab icon matches theme; PNG fallback for older clients) -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo-512.png" />

    <!-- Open Graph (default; PageSEO updates og:title, og:description, og:url per page) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dice-express.pages.dev/" />
    <meta property="og:title" content="Prediction Markets — Trade on Real-World Outcomes | dice.express" />
    <meta property="og:description" content="Trade on prediction markets with Pips. Deposit via crypto, trade on sports, markets, weather & more, withdraw earnings. Peer-to-peer." />
    <meta property="og:image" content="https://dice-express.pages.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="dice.express — Prediction Markets" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="dice.express" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Prediction Markets — Trade on Real-World Outcomes | dice.express" />
    <meta name="twitter:description" content="Trade on prediction markets with Pips. Deposit via crypto, trade sports, markets, weather & more, withdraw earnings. Your choice. Your chance." />
    <meta name="twitter:image" content="https://dice-express.pages.dev/og-image.png" />
    <meta name="twitter:image:alt" content="dice.express — Prediction Markets" />

    <!-- Preload brand font -->
    <link rel="preload" href="/fonts/Comfortaa-Regular.ttf" as="font" type="font/ttf" crossorigin />

    <!-- JSON-LD structured data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "dice.express",
      "alternateName": "dice express",
      "description": "Prediction market platform. Trade on real-world outcomes (sports, crypto, stocks, weather) with Pips. Deposit via crypto, trade peer-to-peer, withdraw earnings. Your choice. Your chance.",
      "url": "https://dice-express.pages.dev/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "description": "In-platform currency (Pips) for trading prediction markets. 1 Pips = 1 USD. Deposit by crypto; withdraw to crypto."
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "dice.express",
      "url": "https://dice-express.pages.dev/",
      "description": "Prediction markets: trade on sports, crypto, weather & more with Pips. Deposit, trade, withdraw.",
      "publisher": { "@type": "Organization", "name": "dice.express" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
