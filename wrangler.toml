# Cloudflare Pages + Workers (converged) configuration for dice.express
# Used by: Git-connected Pages builds, Direct Upload, and `wrangler pages dev`
# Docs: https://developers.cloudflare.com/pages/functions/

name = "dice-express"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "frontend/dist"

# D1 database — create with: npx wrangler d1 create dice-express-db
# Then set database_id below (from the command output) and run: npx wrangler d1 execute dice-express-db --remote --file=./schema/d1/0000_initial.sql
[[d1_databases]]
binding = "DB"
database_name = "dice-express-db"
database_id = "1437a4c8-ff01-4941-a81c-a2420a925c26"

# R2 bucket — create with: npx wrangler r2 bucket create dice-express-r2
[[r2_buckets]]
binding = "R2"
bucket_name = "dice-express-r2"

# KV namespace — create with: npx wrangler kv namespace create DICE_KV (space, not colon)
# Use the id from output below; for preview: npx wrangler kv namespace create DICE_KV --preview
[[kv_namespaces]]
binding = "KV"
id = "bf88f3a357f640ccb3173da7e163570d"

# Vectorize (768-dim cosine) for embedding dedupe of auto-seeded markets. Create index once:
#   npx wrangler vectorize create dice-express-market-embeddings --dimensions=768 --metric=cosine
# After wiping D1 prediction markets, delete vectors (Dashboard) or delete/recreate the index so Vectorize stays aligned.
[[vectorize]]
binding = "VECTORIZE"
index_name = "dice-express-market-embeddings"

# Workers AI — required for @cf/baai/bge-base-en-v1.5 embeddings used with VECTORIZE above.
[ai]
binding = "AI"

[vars]
# P2P-only: new markets get zero liquidity so platform never seeds capital. Trading requires matched orders (P2P).
# Set to "0" or remove when you want to enable AMM with platform liquidity. See docs/ALGORITHMS_AND_RISK.md.
AUTO_MARKETS_ZERO_LIQUIDITY = "1"
# Feed-topic headline markets (GNews/Perigon/… “still in feed”): skipped unless you opt in below.
# Default API behavior also skips them without any var; this flag is committed so Pages/Workers always see it.
AUTO_MARKETS_OUTCOME_ONLY = "1"
# Set AUTO_MARKETS_ALLOW_FEED_TOPIC=1 to create feed-topic headline markets again.
# Embedding dedupe (Vectorize + Workers AI): cosine threshold 0–1; 0.88 catches paraphrases while avoiding over-merging distinct questions.
MARKET_EMBED_SIMILARITY_MIN = "0.88"

# Platform deposit wallets (dice.express Coinbase wallet). EVM chains use the same 0x address.
# Set secrets via Cloudflare Dashboard → Pages/Workers → Settings → Environment variables (see docs/CRYPTO_DEPOSITS.md).
PLATFORM_WALLET_ADDRESS = "0xf3f20aCeBDDD921bC21c8184490416109dE57ba3"
PLATFORM_WALLET_SOL = "6aJHBVSm5cxbYjsjFudoP1gZ3Ni3oMJcaN3ni5fpz3kz"
# BTC/LTC/DOGE use xpub for deriving addresses; store in secrets if needed for display/automation.
# PLATFORM_WALLET_BTC_XPUB = "xpub6..."
# PLATFORM_WALLET_LTC_XPUB = "xpub6..."
# PLATFORM_WALLET_DOGE_XPUB = "xpub6..."

# API keys for automated prediction markets (set via Cloudflare dashboard or: npx wrangler pages secret put <KEY> --project-name=dice-express)
# ALPHA_VANTAGE_API_KEY, COINGECKO_API_KEY, THE_ODDS_API_KEY, OPENWEATHER_API_KEY, WEATHERAPI_API_KEY,
# GNEWS_API_KEY, PERIGON_API_KEY, NEWSAPI_AI_KEY, NEWSDATA_API_KEY, FRED_API_KEY, FINNHUB_API_KEY,
# FEC_API_KEY, OPENFEC_API_KEY, DATA_GOV_API_KEY (shared fallback for FEC/NASA/Congress when service keys unset),
# BLS_API_KEY (BLS only — not api.data.gov; register at data.bls.gov), NASA_API_KEY, CONGRESS_GOV_API_KEY, CONGRESS_GOV_CONGRESS (optional session number),
# RAPIDAPI_KEY, MASSIVE_API_KEY — see docs/PREDICTION_MARKETS.md
# Deposits: ALCHEMY_API_KEY or DEPOSIT_VERIFICATION_RPC_URL, SOLANA_RPC_URL (SPL USDC), DEPOSIT_VERIFICATION_SOLANA_USDC_MINT (optional),
# Solana withdrawals: SOLANA_WALLET_PRIVATE_KEY (secret; pubkey must match PLATFORM_WALLET_SOL),
# AUTO_MARKETS_CRON_SECRET (optional; if set, same value required on Pages for POST seed — cron Worker sends X-Cron-Secret)
